name: Release

# Tag-triggered release build: compiles the `skillmaker` binary for each
# supported platform and publishes a GitHub Release with a tarball per
# platform (plan.md Phase 18 "installer experience").
#
# Scope for this pass: the CLI binary + viewer-dist/ + VERSION, tarred up
# as `skillmaker-<version>-<os>-<arch>.tar.gz`. The Skillmaker.app bundle
# (macOS, code-signed + notarized) is explicitly OUT of scope here --
# signing/notarization is a separate follow-up (plan.md Phase 18 scope
# item (a) mentions the .app bundle as a later addition, not this pass).
#
# Platforms: macOS arm64 (macos-14 runner, native Apple Silicon) and Linux
# x64 (ubuntu-latest). `bun build --compile` produces a binary for the
# *host* platform it runs on -- there's no cross-compile step here, so each
# platform gets its own job on a matching runner. macOS x64 (Intel) is a
# fast-follow, not built here yet.
#
# Also publishes the npm zero-install door (install-simplification.md Phase
# A.4): each matrix job assembles its `@skillmaker/cli-<platform>-<arch>`
# package (scripts/build-npm-packages.sh) alongside its tarball, and
# publish-npm publishes those plus the skillmaker-studio wrapper -- skipped
# gracefully if the NPM_TOKEN secret isn't configured.

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install
        run: bun install --frozen-lockfile
        env:
          # prepare script clones effect source for local research; skip in CI
          SKIP_EFFECT_CLONE: "1"
      - name: Build dist artifact
        run: ./scripts/build-dist.sh
      - name: Package tarball
        run: |
          set -eu
          version="$(cat dist/VERSION)"
          # Tar the three artifacts at the archive's top level (not nested
          # in a wrapper directory) -- install.sh extracts and looks for
          # ./skillmaker and ./viewer-dist directly.
          tarball="skillmaker-${version}-darwin-arm64.tar.gz"
          tar -czf "$tarball" -C dist skillmaker viewer-dist VERSION
          echo "TARBALL=$tarball" >>"$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: skillmaker-darwin-arm64
          path: ${{ env.TARBALL }}
      - name: Build npm packages (platform package + wrapper, Phase A.2/A.3)
        # Tag is "vX.Y.Z" -- npm packages publish under the bare version
        # (no leading "v"), same version the GitHub Release above carries.
        run: ./scripts/build-npm-packages.sh "${GITHUB_REF_NAME#v}"
      - name: Tar npm packages (preserves the executable bit through upload-artifact's zip hop)
        run: |
          set -eu
          tar -czf npm-cli-darwin-arm64.tar.gz -C dist/npm cli-darwin-arm64
          tar -czf npm-skillmaker-studio.tar.gz -C dist/npm skillmaker-studio
      - uses: actions/upload-artifact@v4
        with:
          name: npm-cli-darwin-arm64
          path: npm-cli-darwin-arm64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          # Built identically by either matrix job (it doesn't embed a
          # binary) -- only uploaded once here to avoid a duplicate-name
          # collision with the linux job's own build.
          name: npm-skillmaker-studio
          path: npm-skillmaker-studio.tar.gz

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install
        run: bun install --frozen-lockfile
        env:
          # prepare script clones effect source for local research; skip in CI
          SKIP_EFFECT_CLONE: "1"
      - name: Build dist artifact
        run: ./scripts/build-dist.sh
      - name: Package tarball
        run: |
          set -eu
          version="$(cat dist/VERSION)"
          # Tar the three artifacts at the archive's top level (not nested
          # in a wrapper directory) -- install.sh extracts and looks for
          # ./skillmaker and ./viewer-dist directly.
          tarball="skillmaker-${version}-linux-x64.tar.gz"
          tar -czf "$tarball" -C dist skillmaker viewer-dist VERSION
          echo "TARBALL=$tarball" >>"$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: skillmaker-linux-x64
          path: ${{ env.TARBALL }}
      - name: Build npm package (platform package, Phase A.2)
        run: ./scripts/build-npm-packages.sh "${GITHUB_REF_NAME#v}"
      - name: Tar npm package (preserves the executable bit through upload-artifact's zip hop)
        run: tar -czf npm-cli-linux-x64.tar.gz -C dist/npm cli-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: npm-cli-linux-x64
          path: npm-cli-linux-x64.tar.gz

  publish-release:
    needs: [build-macos-arm64, build-linux-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # Restrict to the release-tarball artifacts (name prefix
          # "skillmaker-") -- without this, merge-multiple would flatten
          # the npm-* artifacts' identically-named package.json files into
          # the same directory too, silently clobbering each other
          # (harmless today since only *.tar.gz is globbed below, but
          # fragile to leave implicit).
          pattern: skillmaker-*
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true

  # The `secrets` context isn't available in a job-level `if:` (actionlint
  # rejects it outright, and an invalid expression there fails the whole
  # workflow file to parse -- not just this job -- so a plain
  # `if: ${{ secrets.NPM_TOKEN != '' }}` on publish-npm would silently kill
  # even the tarball release). Standard indirection: a step CAN read a
  # secret (via `env:`), so compute the presence check there and expose it
  # as a job output; publish-npm's `if:` then only ever reads
  # `needs.*.outputs`, which IS allowed.
  check-npm-token:
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - name: Check whether NPM_TOKEN is configured
        id: check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -eu
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "has-token=true" >>"$GITHUB_OUTPUT"
          else
            echo "has-token=false" >>"$GITHUB_OUTPUT"
          fi

  # Publishes the zero-install npm door (Phase A.4): the two platform
  # packages built above plus the skillmaker-studio wrapper that resolves
  # between them. Gated on the NPM_TOKEN repo secret actually being set --
  # if it's absent (e.g. this repo hasn't been granted npm publish access
  # yet), this job is skipped rather than failing the release, so tagging a
  # release never blocks on npm credentials existing.
  publish-npm:
    needs: [build-macos-arm64, build-linux-x64, check-npm-token]
    runs-on: ubuntu-latest
    if: needs.check-npm-token.outputs.has-token == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          # Restrict to this job's own tarball artifacts -- avoids pulling
          # in the unrelated release tarballs (name prefix "skillmaker-").
          pattern: npm-*
          path: artifacts
          merge-multiple: true
      - name: Extract npm packages (restores the executable bit tar preserved)
        run: |
          set -eu
          mkdir -p pkgs
          for tarball in artifacts/*.tar.gz; do
            tar -xzf "$tarball" -C pkgs
          done
          ls -l pkgs/cli-darwin-arm64/bin pkgs/cli-linux-x64/bin pkgs/skillmaker-studio/bin
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish platform + wrapper packages
        run: |
          set -eu
          for dir in pkgs/cli-darwin-arm64 pkgs/cli-linux-x64 pkgs/skillmaker-studio; do
            echo "==> npm publish ${dir}"
            npm publish "${dir}" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install
        run: bun install --frozen-lockfile
        env:
          # prepare script clones effect source for local research; skip in CI
          SKIP_EFFECT_CLONE: "1"
      - name: Typecheck core
        run: bunx tsc --noEmit -p packages/core
      - name: Typecheck cli
        run: bunx tsc --noEmit -p packages/cli
      - name: Unit tests
        run: bun test packages
      - name: Build viewer
        run: bun run build:viewer
      - name: E2E tests
        run: bun test test/e2e --timeout 30000
      - name: Reindex self-hosted workspace (warn-only)
        # `skillmaker reindex` never fails on data-quality issues in
        # skills/**/evals/risk-map.md or elsewhere (ruling I, data-model.md /
        # plan.md): it surfaces warnings and always exits 0. `continue-on-error`
        # is redundant belt-and-suspenders for that same guarantee, so a CI
        # infra hiccup in this one step (e.g. a corrupt workspace) still can't
        # fail the build.
        continue-on-error: true
        run: bun packages/cli/src/main.ts reindex --json

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install
        run: bun install --frozen-lockfile
        env:
          # prepare script clones effect source for local research; skip in CI
          SKIP_EFFECT_CLONE: "1"
      - name: Typecheck core
        run: bunx tsc --noEmit -p packages/core
      - name: Typecheck cli
        run: bunx tsc --noEmit -p packages/cli
      - name: Unit tests
        run: bun test packages
      - name: Build viewer
        run: bun run build:viewer
      - name: E2E tests
        run: bun test test/e2e --timeout 30000

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <title>Skillmaker Studio</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #18181b;
        }
      }
      .wrap {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: #52525b;
      }
      @media (prefers-color-scheme: dark) {
        .wrap {
          color: #a1a1aa;
        }
      }
      .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid currentColor;
        border-top-color: transparent;
        opacity: 0.6;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        font-size: 13px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <!--
      This is the ONLY local page the desktop shell ever serves. It is
      shown while the sidecar `skillmaker start` boots (and while the
      workspace picker is up); the Rust side calls window.navigate() to
      hand off to the sidecar's http://localhost:<port> origin once the
      server is ready. If that hand-off never happens (e.g. the picker is
      cancelled with no remembered workspace), this stays on screen with
      no dead-end interaction other than app quit.
    -->
    <div class="wrap">
      <div class="spinner"></div>
      <p>Starting Skillmaker Studio…</p>
    </div>
  </body>
</html>
